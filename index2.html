<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Attendance System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    .date-display {
      text-align: center;
      color: #666;
      font-size: 0.95em;
      margin-bottom: 25px;
      font-weight: 500;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input[type="text"], input[type="date"], select {
      padding: 12px 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus, input[type="date"]:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    button {
      padding: 12px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1em;
      transition: all 0.3s;
    }

    button:hover {
      background: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .danger {
      background: #e74c3c;
    }

    .danger:hover {
      background: #c0392b;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      border-bottom: 2px solid #eee;
    }

    .tab-btn {
      padding: 12px 20px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-weight: 600;
      color: #999;
      transition: all 0.3s;
    }

    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .stat-card h3 {
      font-size: 0.9em;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 2em;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th {
      background: #667eea;
      color: white;
      padding: 15px;
      text-align: left;
      font-weight: 600;
    }

    td {
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
    }

    tr:hover {
      background: #f9f9f9;
    }

    .present-cell {
      background: #d4edda;
      color: #155724;
      font-weight: 600;
      text-align: center;
      border-radius: 5px;
    }

    .absent-cell {
      background: #f8d7da;
      color: #721c24;
      font-weight: 600;
      text-align: center;
      border-radius: 5px;
    }

    .action-btn {
      padding: 6px 12px;
      margin: 0 3px;
      font-size: 0.9em;
    }

    .delete-btn {
      background: #e74c3c;
    }

    .delete-btn:hover {
      background: #c0392b;
    }

    .percentage {
      font-weight: 600;
      text-align: center;
    }

    .percentage.high {
      color: #27ae60;
    }

    .percentage.medium {
      color: #f39c12;
    }

    .percentage.low {
      color: #e74c3c;
    }

    .no-data {
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 1.1em;
    }

    .record-date {
      font-size: 0.9em;
      color: #666;
    }

    .history-group {
      margin-bottom: 30px;
      border: 1px solid #eee;
      border-radius: 8px;
      overflow: hidden;
    }

    .history-date {
      background: #f5f5f5;
      padding: 15px;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #eee;
    }

    @media (max-width: 768px) {
      .controls {
        flex-direction: column;
      }

      input, button, select {
        width: 100%;
      }

      h1 {
        font-size: 1.8em;
      }

      table {
        font-size: 0.9em;
      }

      th, td {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 Student Attendance System</h1>
    <div class="date-display">Today: <span id="todayDate"></span></div>

    <div class="controls">
      <input type="text" id="studentName" placeholder="Enter Student Name">
      <button onclick="addStudent()">➕ Add Student</button>
      <input type="date" id="attendanceDate" onchange="loadTodayAttendance()">
      <button onclick="markAllPresent()">✓ Mark All Present</button>
      <button onclick="downloadData()">📥 Download Data</button>
      <button class="danger" onclick="clearAllData()">🗑️ Clear All</button>
      <button onclick="debugInfo()">🐛 Debug Info</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('today')">Today's Attendance</button>
      <button class="tab-btn" onclick="switchTab('statistics')">Statistics</button>
      <button class="tab-btn" onclick="switchTab('history')">History</button>
    </div>

    <!-- Today's Attendance Tab -->
    <div id="today" class="tab-content active">
      <div class="stats-container" id="todayStats"></div>
      <table id="todayTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="todayEmpty" class="no-data"></div>
    </div>

    <!-- Statistics Tab -->
    <div id="statistics" class="tab-content">
      <table id="statsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Total Days</th>
            <th>Present Days</th>
            <th>Absent Days</th>
            <th>Attendance %</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="statsEmpty" class="no-data"></div>
    </div>

    <!-- History Tab -->
    <div id="history" class="tab-content">
      <div id="historyContent"></div>
      <div id="historyEmpty" class="no-data"></div>
    </div>
  </div>

  <script>
    // Initialize data
    let allAttendance = JSON.parse(localStorage.getItem("allAttendance")) || {};
    let students = JSON.parse(localStorage.getItem("students")) || [];

    function getTodayDate() {
      const dateInput = document.getElementById("attendanceDate");
      if (dateInput && dateInput.value) {
        return dateInput.value;
      }
      return new Date().toISOString().split('T')[0];
    }

    function formatDate(dateStr) {
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', options);
    }

    function saveData() {
      localStorage.setItem("allAttendance", JSON.stringify(allAttendance));
      localStorage.setItem("students", JSON.stringify(students));
    }

    function addStudent() {
      const name = document.getElementById("studentName").value.trim();
      if (name === "") {
        alert("⚠️ Please enter student name");
        return;
      }
      if (students.some(s => s.name.toLowerCase() === name.toLowerCase())) {
        alert("⚠️ Student already exists");
        return;
      }

      const newId = Date.now().toString();
      students.push({ id: newId, name: name });
      
      // Add new student to all existing dates
      Object.keys(allAttendance).forEach(date => {
        if (!allAttendance[date][newId]) {
          allAttendance[date][newId] = "Absent";
        }
      });
      
      saveData();
      document.getElementById("studentName").value = "";
      console.log("Student added:", students);
      renderTodayTable();
      renderTodayStats();
      renderStatistics();
    }

    function ensureDateExists() {
      const today = getTodayDate();
      if (!allAttendance[today]) {
        allAttendance[today] = {};
        students.forEach(s => {
          allAttendance[today][s.id] = "Absent";
        });
        saveData();
      }
    }

    function loadTodayAttendance() {
      ensureDateExists();
      renderTodayTable();
      renderTodayStats();
    }

    function renderTodayTable() {
      ensureDateExists();
      const today = getTodayDate();
      const tbody = document.querySelector("#todayTable tbody");
      const empty = document.getElementById("todayEmpty");

      tbody.innerHTML = "";

      if (students.length === 0) {
        empty.textContent = "No students added yet. Add students to start tracking attendance.";
        document.getElementById("todayTable").style.display = "none";
        return;
      }

      document.getElementById("todayTable").style.display = "table";
      empty.textContent = "";

      students.forEach((student, index) => {
        const studentId = student.id.toString();
        const status = (allAttendance[today] && allAttendance[today][studentId]) ? allAttendance[today][studentId] : "Absent";
        const row = document.createElement("tr");
        row.className = status === "Present" ? "present" : "absent";

        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${student.name}</td>
          <td><span class="${status === 'Present' ? 'present-cell' : 'absent-cell'}">${status}</span></td>
          <td>
            <button class="action-btn" onclick="toggleAttendance('${studentId}')">Toggle</button>
            <button class="action-btn delete-btn" onclick="deleteStudent('${studentId}')">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function renderTodayStats() {
      ensureDateExists();
      const today = getTodayDate();
      const statsDiv = document.getElementById("todayStats");
      const attendance = allAttendance[today] || {};

      const presentCount = Object.values(attendance).filter(s => s === "Present").length;
      const absentCount = students.length - presentCount;

      statsDiv.innerHTML = `
        <div class="stat-card">
          <h3>Total Students</h3>
          <div class="value">${students.length}</div>
        </div>
        <div class="stat-card">
          <h3>Present Today</h3>
          <div class="value" style="color: #d4edda;">${presentCount}</div>
        </div>
        <div class="stat-card">
          <h3>Absent Today</h3>
          <div class="value" style="color: #f8d7da;">${absentCount}</div>
        </div>
        <div class="stat-card">
          <h3>Attendance Rate</h3>
          <div class="value">${students.length > 0 ? Math.round((presentCount / students.length) * 100) : 0}%</div>
        </div>
      `;
    }

    function toggleAttendance(studentId) {
      const today = getTodayDate();
      ensureDateExists();
      
      const currentStatus = allAttendance[today][studentId];
      allAttendance[today][studentId] = (currentStatus === "Present") ? "Absent" : "Present";
      
      saveData();
      renderTodayTable();
      renderTodayStats();
      renderStatistics();
    }

    function deleteStudent(studentId) {
      if (confirm("Delete this student? All attendance records will be removed.")) {
        students = students.filter(s => s.id.toString() !== studentId);
        Object.keys(allAttendance).forEach(date => {
          delete allAttendance[date][studentId];
        });
        saveData();
        renderTodayTable();
        renderTodayStats();
        renderStatistics();
        renderHistory();
      }
    }

    function renderStatistics() {
      const tbody = document.querySelector("#statsTable tbody");
      const empty = document.getElementById("statsEmpty");

      tbody.innerHTML = "";

      if (students.length === 0) {
        empty.textContent = "No students to display statistics.";
        document.getElementById("statsTable").style.display = "none";
        return;
      }

      document.getElementById("statsTable").style.display = "table";
      empty.textContent = "";

      students.forEach((student, index) => {
        let totalDays = 0;
        let presentDays = 0;
        const studentId = student.id.toString();

        Object.keys(allAttendance).forEach(date => {
          if (allAttendance[date][studentId]) {
            totalDays++;
            if (allAttendance[date][studentId] === "Present") {
              presentDays++;
            }
          }
        });

        const percentage = totalDays > 0 ? Math.round((presentDays / totalDays) * 100) : 0;
        let percentageClass = percentage >= 75 ? "high" : percentage >= 50 ? "medium" : "low";

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${student.name}</td>
          <td>${totalDays}</td>
          <td style="color: #27ae60; font-weight: 600;">${presentDays}</td>
          <td style="color: #e74c3c; font-weight: 600;">${totalDays - presentDays}</td>
          <td class="percentage ${percentageClass}">${percentage}%</td>
          <td><button class="action-btn delete-btn" onclick="deleteStudent('${studentId}')">Delete</button></td>
        `;
        tbody.appendChild(row);
      });
    }

    function renderHistory() {
      const historyDiv = document.getElementById("historyContent");
      const empty = document.getElementById("historyEmpty");

      const dates = Object.keys(allAttendance).sort().reverse();

      if (dates.length === 0) {
        empty.textContent = "No attendance records found.";
        historyDiv.innerHTML = "";
        return;
      }

      historyDiv.innerHTML = "";
      empty.textContent = "";

      dates.forEach(date => {
        const dayAttendance = allAttendance[date];
        const presentCount = Object.values(dayAttendance).filter(s => s === "Present").length;

        let html = `
          <div class="history-group">
            <div class="history-date">${formatDate(date)} - ${presentCount}/${students.length} Present</div>
            <table style="margin: 0;">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
        `;

        students.forEach((student, index) => {
          const status = dayAttendance[student.id.toString()] || "Absent";
          html += `
            <tr class="${status === 'Present' ? 'present' : 'absent'}">
              <td>${index + 1}</td>
              <td>${student.name}</td>
              <td><span class="${status === 'Present' ? 'present-cell' : 'absent-cell'}">${status}</span></td>
            </tr>
          `;
        });

        html += `</tbody></table></div>`;
        historyDiv.innerHTML += html;
      });
    }

    function markAllPresent() {
      const today = getTodayDate();
      ensureDateExists();
      
      students.forEach(s => {
        allAttendance[today][s.id] = "Present";
      });
      saveData();
      renderTodayTable();
      renderTodayStats();
      renderStatistics();
    }

    function downloadData() {
      let csvContent = "data:text/csv;charset=utf-8,";
      csvContent += "Student Attendance Report\n\n";
      
      // Statistics section
      csvContent += "OVERALL STATISTICS\n";
      csvContent += "Name,Total Days,Present Days,Absent Days,Attendance %\n";

      students.forEach(student => {
        let totalDays = 0, presentDays = 0;
        const studentId = student.id.toString();
        
        Object.keys(allAttendance).forEach(date => {
          if (allAttendance[date][studentId]) {
            totalDays++;
            if (allAttendance[date][studentId] === "Present") presentDays++;
          }
        });
        
        const percentage = totalDays > 0 ? Math.round((presentDays / totalDays) * 100) : 0;
        csvContent += `${student.name},${totalDays},${presentDays},${totalDays - presentDays},${percentage}%\n`;
      });

      csvContent += "\n\nDETAILED DAILY RECORDS\n";

      const dates = Object.keys(allAttendance).sort();
      dates.forEach(date => {
        csvContent += `\n${formatDate(date)}\n`;
        csvContent += "Name,Status\n";
        students.forEach(student => {
          const status = allAttendance[date][student.id.toString()] || "Absent";
          csvContent += `${student.name},${status}\n`;
        });
      });

      const link = document.createElement("a");
      link.setAttribute("href", encodeURI(csvContent));
      link.setAttribute("download", `attendance_report_${new Date().toISOString().split('T')[0]}.csv`);
      link.click();
    }

    function clearAllData() {
      if (confirm("⚠️ This will delete ALL students and attendance records. Are you sure?")) {
        if (confirm("This action cannot be undone. Click OK to confirm.")) {
          students = [];
          allAttendance = {};
          saveData();
          document.getElementById("studentName").value = "";
          renderTodayTable();
          renderTodayStats();
          renderStatistics();
          renderHistory();
        }
      }
    }

    function debugInfo() {
      console.clear();
      console.log("=== DEBUG INFO ===");
      console.log("Total Students:", students.length);
      console.log("Students Array:", students);
      console.log("Attendance Data:", allAttendance);
      alert("Check Console (F12) for debug info!\n\nTotal Students: " + students.length + "\n\nStudent Names:\n" + students.map(s => s.name).join("\n"));
    }

    function switchTab(tabName) {
      document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
      
      document.getElementById(tabName).classList.add("active");
      event.target.classList.add("active");

      if (tabName === "history") renderHistory();
      if (tabName === "statistics") renderStatistics();
      if (tabName === "today") loadTodayAttendance();
    }

    // Initialize
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("attendanceDate").value = today;
    document.getElementById("todayDate").textContent = formatDate(today);
    
    console.log("Page initialized - Students:", students);
    console.log("Attendance data:", allAttendance);
    
    loadTodayAttendance();
    renderStatistics();
    renderHistory();
  </script>
</body>
</html>
